name: Publish Article from Issue

on:
  issues:
    types: [labeled]

jobs:
  publish-article:
    if: github.event.label.name == 'publish'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install markdown python-dateutil

      - name: Process Issue into Article
        id: process_article
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_DATE: ${{ github.event.issue.created_at }}
          PYTHONUNBUFFERED: "1"
        run: |
          python execution/publish_from_issue.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pages/articles/
          git commit -m "feat(blog): Publish new article from issue #${{ github.event.issue.number }}" || echo "No changes to commit"
          git push

      - name: Comment on Issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🚀 **Article Published!** The changes have been pushed to the `main` branch. \n\nI have closed this issue."
            });
            github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "closed"
            });
